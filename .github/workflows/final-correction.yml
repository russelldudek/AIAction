name: Apply final campaign correction

on:
  push:
    branches: [main]
    paths:
      - 'apply_final_correction.py'
      - '.github/workflows/final-correction.yml'

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Apply correction
        run: python apply_final_correction.py
      - name: Commit corrected campaign
        run: |
          rm -f apply_final_correction.py .github/workflows/final-correction.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Advance hero CTA and record narrow-phone QA'
          git push
