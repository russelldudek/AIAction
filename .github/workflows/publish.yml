name: Build PDFs and publish candidate vision

on:
  push:
    branches: [main]
    paths:
      - '.campaign-bundle/**'
      - 'materialize_campaign.py'
      - 'apply_verified_url_correction.py'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Materialize campaign when bundle is present
        run: |
          if [ -f materialize_campaign.py ]; then
            python materialize_campaign.py
          fi

      - name: Apply verified portfolio URL correction
        run: |
          if [ -f apply_verified_url_correction.py ]; then
            python apply_verified_url_correction.py
          fi

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Generate recruiter-ready PDFs
        shell: bash
        run: |
          set -euo pipefail
          CHROME='${{ steps.chrome.outputs.chrome-path }}'
          mkdir -p pdfs

          render_pdf() {
            local html="$1"
            local output="$2"
            timeout 90s "$CHROME" \
              --headless=new \
              --no-sandbox \
              --disable-gpu \
              --disable-dev-shm-usage \
              --allow-file-access-from-files \
              --run-all-compositor-stages-before-draw \
              --virtual-time-budget=3000 \
              --no-pdf-header-footer \
              --print-to-pdf="$GITHUB_WORKSPACE/pdfs/$output" \
              "file://$GITHUB_WORKSPACE/$html"
          }

          render_pdf resume.html Russell-Dudek-Covington-Resume.pdf
          render_pdf cover-letter.html Russell-Dudek-Covington-Cover-Letter.pdf
          render_pdf interview-brief.html Russell-Dudek-Covington-Interview-Brief.pdf
          render_pdf 120-day-plan.html Russell-Dudek-Covington-120-Day-Plan.pdf
          render_pdf workflow-precedent-review.html Russell-Dudek-Covington-Workflow-Precedent-Review.pdf

      - name: Validate PDF contracts and verified URLs
        shell: bash
        run: |
          set -euo pipefail
          check_pages() {
            local file="$1"
            local expected="$2"
            local actual
            actual=$(pdfinfo "$file" | awk '/^Pages:/ {print $2}')
            if [ "$actual" != "$expected" ]; then
              echo "Page contract failed for $file: expected $expected, got $actual"
              exit 1
            fi
          }
          check_pages pdfs/Russell-Dudek-Covington-Resume.pdf 2
          check_pages pdfs/Russell-Dudek-Covington-Cover-Letter.pdf 1
          check_pages pdfs/Russell-Dudek-Covington-Interview-Brief.pdf 4
          check_pages pdfs/Russell-Dudek-Covington-120-Day-Plan.pdf 3
          check_pages pdfs/Russell-Dudek-Covington-Workflow-Precedent-Review.pdf 2
          for pdf in pdfs/*.pdf; do
            pdftotext "$pdf" - | grep -F 'https://russelldudek.github.io/' >/dev/null
            if pdftotext "$pdf" - | grep -F 'https://russelldudek.github.io/AIAction/' >/dev/null; then
              echo "Unverified campaign URL remains in $pdf"
              exit 1
            fi
          done

      - name: Finalize publication state
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          manifest = Path('artifact-manifest.json')
          data = json.loads(manifest.read_text())
          data['state'] = 'blocked'
          data['candidate_vision'] = None
          data['portfolio_url'] = 'https://russelldudek.github.io/'
          data['publication'] = {
              'branch': 'main',
              'candidate_vision': None,
              'portfolio_url': 'https://russelldudek.github.io/',
              'repository_status': 'published',
              'live_status': 'blocked - GitHub Pages not enabled'
          }
          manifest.write_text(json.dumps(data, indent=2) + '\n')

          audit = Path('campaign-audit.md')
          text = audit.read_text()
          text = text.replace(
              'State: building until publication and independent live verification complete.',
              'State: blocked. Readable source and validated PDFs are published; live verification is blocked because GitHub Pages is not enabled.'
          )
          text = text.replace(
              'State: published. Live verification remains a separate gate until GitHub Pages reports a successful deployment.',
              'State: blocked. Readable source and validated PDFs are published; live verification is blocked because GitHub Pages is not enabled.'
          )
          if '## Automated publication verification' not in text:
              text += '\n## Automated publication verification\n- Exact PDF page counts validated in GitHub Actions\n- Candidate files committed to main\n- Pages deployment attempted from the validated workspace\n'
          if '## Verified URL Correction' not in text:
              text += '\n## Verified URL Correction\n- The unverified role-specific Pages URL was removed because Pages is not enabled.\n- Candidate-facing documents use Russell\'s verified public portfolio URL: https://russelldudek.github.io/\n- The cover letter describes the role-specific package without claiming that it is live.\n- PDFs were regenerated and exact page contracts revalidated after the correction.\n'
          audit.write_text(text)
          PY
          rm -rf .campaign-bundle materialize_campaign.py
          rm -f apply_verified_url_correction.py .github/workflows/verified-url-correction.yml
          if grep -R -F 'https://russelldudek.github.io/AIAction/' \
            --exclude-dir=.git \
            --exclude='*.pdf' .; then
            echo 'Unverified campaign URL remains in readable source.'
            exit 1
          fi

      - name: Commit validated campaign files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Use verified portfolio URL and refresh candidate PDFs'
            git push
          fi

      - name: Configure Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        id: upload
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy Pages
        id: deployment
        if: steps.configure.outcome == 'success' && steps.upload.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Record Pages status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          sleep 8
          curl -sS -o /tmp/pages-response.json \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages" || true
          python - <<'PY'
          from pathlib import Path
          import json, os
          raw = Path('/tmp/pages-response.json').read_text() if Path('/tmp/pages-response.json').exists() else ''
          try:
              response = json.loads(raw) if raw else None
          except json.JSONDecodeError:
              response = raw
          status = {
              'configure_outcome': os.environ.get('CONFIGURE_OUTCOME'),
              'upload_outcome': os.environ.get('UPLOAD_OUTCOME'),
              'deploy_outcome': os.environ.get('DEPLOY_OUTCOME'),
              'deployment_url': os.environ.get('DEPLOY_URL') or None,
              'api_response': response,
          }
          Path('pages-status.json').write_text(json.dumps(status, indent=2) + '\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pages-status.json
          if ! git diff --cached --quiet; then
            git commit -m 'Record candidate site deployment status'
            git push
          fi
