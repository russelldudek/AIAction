name: Validate and deploy candidate vision

on:
  push:
    branches: [main]
    paths:
      - '.release-bundle/**'
      - 'materialize_release.py'
      - '.github/workflows/enable-pages.yml'
      - 'index.html'
      - 'styles.css'
      - 'app.js'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: Materialize release package when present
        shell: bash
        run: |
          set -euo pipefail
          if [ -f materialize_release.py ]; then
            python materialize_release.py
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m 'Publish Living Precedent Engine'
            git push
          fi
          git rev-parse HEAD > /tmp/source-sha

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Validate source and exact PDF contracts
        shell: bash
        run: |
          set -euo pipefail
          for file in index.html styles.css app.js resume.html cover-letter.html interview-brief.html 120-day-plan.html workflow-precedent-review.html source-notes.html artifact-manifest.json .nojekyll; do
            test -s "$file" || { echo "Missing or empty: $file"; exit 1; }
          done
          check_pages() {
            local file="$1"
            local expected="$2"
            local actual
            actual=$(pdfinfo "$file" | awk '/^Pages:/ {print $2}')
            test "$actual" = "$expected" || {
              echo "Page contract failed for $file: expected $expected, got $actual"
              exit 1
            }
          }
          check_pages pdfs/Russell-Dudek-Covington-Resume.pdf 2
          check_pages pdfs/Russell-Dudek-Covington-Cover-Letter.pdf 1
          check_pages pdfs/Russell-Dudek-Covington-Interview-Brief.pdf 4
          check_pages pdfs/Russell-Dudek-Covington-120-Day-Plan.pdf 3
          check_pages pdfs/Russell-Dudek-Covington-Workflow-Precedent-Review.pdf 2

      - name: Enable GitHub Pages when missing
        id: enable
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages"
          code=$(curl -sS -o /tmp/pages-get.json -w '%{http_code}' \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "$api")
          if [ "$code" = "404" ]; then
            create_code=$(curl -sS -o /tmp/pages-create.json -w '%{http_code}' \
              -X POST \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "$api" \
              -d '{"build_type":"workflow"}')
            cat /tmp/pages-create.json || true
            if [ "$create_code" != "201" ] && [ "$create_code" != "409" ]; then
              echo "Pages enablement failed with HTTP $create_code"
              exit 1
            fi
          elif [ "$code" != "200" ]; then
            cat /tmp/pages-get.json || true
            echo "Pages status check failed with HTTP $code"
            exit 1
          fi

      - name: Stage public site
        if: steps.enable.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/pdfs
          cp index.html resume.html cover-letter.html interview-brief.html 120-day-plan.html workflow-precedent-review.html source-notes.html styles.css app.js _site/
          cp pdfs/*.pdf _site/pdfs/
          touch _site/.nojekyll

      - name: Configure Pages
        id: configure
        if: steps.enable.outcome == 'success'
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        id: upload
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        if: steps.upload.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Verify live routes
        id: live
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base="${PUBLIC_URL%/}/"
          routes=(
            ""
            "styles.css"
            "app.js"
            "resume.html"
            "cover-letter.html"
            "interview-brief.html"
            "120-day-plan.html"
            "workflow-precedent-review.html"
            "source-notes.html"
            "pdfs/Russell-Dudek-Covington-Resume.pdf"
            "pdfs/Russell-Dudek-Covington-Cover-Letter.pdf"
            "pdfs/Russell-Dudek-Covington-Interview-Brief.pdf"
            "pdfs/Russell-Dudek-Covington-120-Day-Plan.pdf"
            "pdfs/Russell-Dudek-Covington-Workflow-Precedent-Review.pdf"
          )
          for attempt in $(seq 1 30); do
            failed=0
            for route in "${routes[@]}"; do
              code=$(curl -L -sS -o /tmp/live-body -w '%{http_code}' "${base}${route}" || true)
              if [ "$code" != "200" ]; then
                failed=1
                break
              fi
            done
            if [ "$failed" = "0" ]; then
              printf '%s' "$base" > /tmp/live-url
              exit 0
            fi
            sleep 10
          done
          echo "Live route verification did not reach HTTP 200 within the retry window."
          exit 1

      - name: Record deployment status
        if: always()
        env:
          ENABLE_OUTCOME: ${{ steps.enable.outcome }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          LIVE_OUTCOME: ${{ steps.live.outcome }}
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, os
          source = Path('/tmp/source-sha').read_text().strip() if Path('/tmp/source-sha').exists() else os.environ.get('GITHUB_SHA')
          url = os.environ.get('DEPLOYMENT_URL') or None
          status = {
              'source_sha': source,
              'enable_outcome': os.environ.get('ENABLE_OUTCOME'),
              'configure_outcome': os.environ.get('CONFIGURE_OUTCOME'),
              'upload_outcome': os.environ.get('UPLOAD_OUTCOME'),
              'deploy_outcome': os.environ.get('DEPLOY_OUTCOME'),
              'live_outcome': os.environ.get('LIVE_OUTCOME'),
              'deployment_url': url,
              'intended_url': 'https://russelldudek.github.io/AIAction/'
          }
          Path('pages-status.json').write_text(json.dumps(status, indent=2) + '\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pages-status.json
          if ! git diff --cached --quiet; then
            git commit -m 'Record candidate vision deployment status'
            git push
          fi

      - name: Fail when Pages is not live
        if: steps.enable.outcome != 'success' || steps.configure.outcome != 'success' || steps.upload.outcome != 'success' || steps.deployment.outcome != 'success' || steps.live.outcome != 'success'
        run: exit 1
