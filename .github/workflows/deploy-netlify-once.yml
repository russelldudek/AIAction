name: Deploy candidate vision to Netlify once

on:
  push:
    branches: [main]
    paths:
      - '.deploy-netlify-ready'
      - '.deploy-netlify-retry'

permissions:
  contents: write

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout validated main
        uses: actions/checkout@v4

      - name: Record deployment startup
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, datetime
          Path('deploy-started.json').write_text(json.dumps({
            'source_sha': '${{ github.sha }}',
            'started_at_utc': datetime.datetime.now(datetime.timezone.utc).isoformat()
          }, indent=2) + '\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deploy-started.json
          git commit -m 'Record Netlify deployment startup'
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upload main to reserved production site
        run: >-
          npx -y @netlify/mcp@latest
          --site-id 10a807db-a525-471a-b71f-3b871399f7f2
          --proxy-path "https://netlify-mcp.netlify.app//proxy/eyJhbGciOiJkaXIiLCJlbmMiOiJBMjU2R0NNIn0..iWaasoya32MQoulG.jXekiiDvr8E-UDOBFf05tpFVggCILEjI-d6eWb2qaBZW1dvVGe0y4sejHzlM8t0XeLOz3cvIvFE-gWIQAi0AcbltnhuP2k5eBe6aovwFpHiil8LfGUWR4f3VHQ_MUiFj-iYb-do0M18MVwXfDNuE2CpV1Rkr7io4GSSSI3dD7DPPbPI41awMb_0WNc2Xvurus-eiqYN8O_RhsBF6KysLPSIChzDjWnofyY-WkH0PtkUo1FkKo_SLrQqMiyb66nQ88Ej_S9r2hZzeQq_YKZMf2j92QJwa8cQJlrT-II1ZwGreHaatN7TNu-W1Jp87XKcHqCTpZ84sWQT03XRsWi2l7vHZUAUaNqzg0qmhrm5zi468aPnuJ_ppw15qHOmsyQTg5NYbVkki._ZrGTJxwuT_YbNDWvzwDVg"
          --no-wait

      - name: Verify exact live experience
        run: |
          set -euo pipefail
          URL='https://russell-dudek-covington-ai.netlify.app'
          ready=0
          for attempt in $(seq 1 45); do
            if curl -fsS "$URL/" -o /tmp/covington-live && grep -F 'Build the common law of AI-enabled work.' /tmp/covington-live >/dev/null; then
              ready=1
              break
            fi
            sleep 8
          done
          [ "$ready" = '1' ]
          grep -F 'Living precedent studio' /tmp/covington-live >/dev/null
          curl -fsS "$URL/styles.css" | grep -F -- '--gold:#e8bd6b' >/dev/null
          curl -fsS "$URL/app.js" | grep -F 'Living precedent sphere' >/dev/null
          curl -fsSI "$URL/resume.html" | grep -E 'HTTP/[0-9.]+ 200' >/dev/null
          curl -fsSI "$URL/cover-letter.html" | grep -E 'HTTP/[0-9.]+ 200' >/dev/null
          curl -fsSI "$URL/pdfs/Russell-Dudek-Covington-Resume.pdf" | grep -E 'HTTP/[0-9.]+ 200' >/dev/null
          curl -fsSI "$URL/pdfs/Russell-Dudek-Covington-Cover-Letter.pdf" | grep -E 'HTTP/[0-9.]+ 200' >/dev/null

      - name: Record verified deployment and remove one-time job
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, hashlib, datetime
          body = Path('/tmp/covington-live').read_bytes()
          Path('live-site-status.json').write_text(json.dumps({
            'source_sha': '${{ github.sha }}',
            'live_outcome': 'success',
            'live_url': 'https://russell-dudek-covington-ai.netlify.app/',
            'source_signature_found': True,
            'live_index_sha256': hashlib.sha256(body).hexdigest(),
            'verified_at_utc': datetime.datetime.now(datetime.timezone.utc).isoformat()
          }, indent=2) + '\n')
          PY
          rm -f .github/workflows/deploy-netlify-once.yml .deploy-netlify-ready .deploy-netlify-retry deploy-started.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record verified live candidate vision'
          git push
