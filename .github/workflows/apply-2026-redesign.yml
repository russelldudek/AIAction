name: Apply 2026 Covington redesign

on:
  push:
    branches: [main]
    paths:
      - '.redesign-payload/ready'

permissions:
  contents: write

jobs:
  apply-redesign:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Materialize validated redesign
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip, json
          payload = ''.join(p.read_text().strip() for p in sorted(Path('.redesign-payload').glob('chunk-*')))
          files = json.loads(gzip.decompress(base64.b64decode(payload)))
          for name, content in files.items():
              Path(name).write_text(content, encoding='utf-8')
          print('Applied:', ', '.join(files))
          PY
          rm -rf .redesign-payload
          rm -f .github/workflows/apply-2026-redesign.yml
      - name: Commit production source to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Launch 2026 living precedent candidate vision'
          git push
