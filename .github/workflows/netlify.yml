name: Verify live review site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  LIVE_URL: https://6a5f04af44a6f79a3a2652a5--russell-dudek-covington-ai.netlify.app/

concurrency:
  group: live-review
  cancel-in-progress: true

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify live review routes and source signature
        id: live
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          routes=("" styles.css app.js resume.html cover-letter.html interview-brief.html 120-day-plan.html workflow-precedent-review.html source-notes.html pdfs/Russell-Dudek-Covington-Resume.pdf pdfs/Russell-Dudek-Covington-Cover-Letter.pdf)
          for attempt in $(seq 1 6); do
            failed=0
            for route in "${routes[@]}"; do
              code=$(curl -L -sS -o /tmp/live-body -w '%{http_code}' "${LIVE_URL}${route}" || true)
              [ "$code" = "200" ] || { failed=1; break; }
            done
            if [ "$failed" = "0" ]; then
              curl -L -sS "${LIVE_URL}" -o /tmp/live-index
              grep -q 'Living Precedent Engine' /tmp/live-index || { failed=1; }
              grep -q 'Build the common law of AI-enabled work' /tmp/live-index || { failed=1; }
            fi
            [ "$failed" = "0" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Record live-site status
        if: always()
        env:
          LIVE_OUTCOME: ${{ steps.live.outcome }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, os, hashlib
          body = Path('/tmp/live-index').read_bytes() if Path('/tmp/live-index').exists() else b''
          Path('live-site-status.json').write_text(json.dumps({
              'source_sha': os.environ.get('GITHUB_SHA'),
              'live_outcome': os.environ.get('LIVE_OUTCOME'),
              'live_url': os.environ.get('LIVE_URL'),
              'source_signature_found': b'Living Precedent Engine' in body and b'Build the common law of AI-enabled work' in body,
              'live_index_sha256': hashlib.sha256(body).hexdigest() if body else None
          }, indent=2) + '\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-site-status.json
          if ! git diff --cached --quiet; then
            git commit -m 'Record live review verification'
            git push
          fi

      - name: Fail when live review is unavailable
        if: steps.live.outcome != 'success'
        run: exit 1
